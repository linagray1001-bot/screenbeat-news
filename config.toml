baseURL = "https://screenbeat.c0c.live/"
languageCode = "en-us"
title = "ScreenBeat News"
enableRobotsTXT = true

[pagination]
  pagerSize = 12

[params]
  description = "The pulse of screen entertainment"
  author = "ScreenBeat News Team"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "daily"
  priority = 0.8

[markup.goldmark.renderer]
  unsafe = true
